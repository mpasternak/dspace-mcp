name: Publish to PyPI

# Publikacja wyzwalana wydaniem w GitHubie. Nie ma tu żadnego tokenu PyPI:
# uwierzytelnienie idzie przez OIDC (trusted publishing), czyli PyPI ufa
# TEMU workflow w TYM repozytorium, a nie sekretowi, który mógłby wyciec.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Run tests before releasing anything
        run: |
          uv sync --dev
          uv run pytest -q

      - name: Build sdist and wheel
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Środowisko `pypi` pozwala wymusić ręczne zatwierdzenie wydania i jest
    # częścią tożsamości, którą weryfikuje PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/dspace-mcp
    permissions:
      id-token: write # wymagane przez OIDC — to zastępuje token API
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
